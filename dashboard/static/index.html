<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GPU Cluster Health</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #080c10;
    --surface:   #0d1117;
    --border:    #1e2d3d;
    --pass:      #00e5a0;
    --fail:      #ff3b5c;
    --warn:      #ffc107;
    --accent:    #00b4ff;
    --text:      #c9d1d9;
    --muted:     #5a6a7a;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui:   'Barlow', sans-serif;
    --font-head: 'Barlow Condensed', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scan-line overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,180,255,0.015) 2px,
      rgba(0,180,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d1520 0%, var(--bg) 100%);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-area {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .logo-area h1 {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
  }

  .logo-area .sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  #last-updated {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  #refresh-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 1px;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  #refresh-btn:hover {
    background: rgba(0,180,255,0.1);
    box-shadow: 0 0 12px rgba(0,180,255,0.3);
  }

  #refresh-btn.loading .icon { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MAIN ───────────────────────────────────────── */
  main { padding: 32px; max-width: 1400px; margin: 0 auto; }

  /* ── CLUSTER BANNER ─────────────────────────────── */
  #cluster-banner {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0;
    border: 1px solid var(--border);
    margin-bottom: 32px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.4s, transform 0.4s;
  }

  #cluster-banner.visible { opacity: 1; transform: none; }

  .status-slab {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 40px;
    min-width: 180px;
    background: #0d1520;
  }

  .status-slab .label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .status-slab .badge {
    font-family: var(--font-head);
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 6px 20px;
    border: 2px solid;
  }

  .badge.PASS   { color: var(--pass); border-color: var(--pass); box-shadow: 0 0 20px rgba(0,229,160,0.25); }
  .badge.FAIL   { color: var(--fail); border-color: var(--fail); box-shadow: 0 0 20px rgba(255,59,92,0.25); }
  .badge.DEGRADED { color: var(--warn); border-color: var(--warn); box-shadow: 0 0 20px rgba(255,193,7,0.25); }
  .badge.NO_DATA  { color: var(--muted); border-color: var(--muted); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    border-left: 1px solid var(--border);
  }

  .stat-cell {
    padding: 24px 28px;
    border-right: 1px solid var(--border);
    position: relative;
  }

  .stat-cell:last-child { border-right: none; }

  .stat-cell .slabel {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-cell .sval {
    font-family: var(--font-head);
    font-size: 36px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }

  .stat-cell .sval.accent { color: var(--accent); }
  .stat-cell .sval.pass   { color: var(--pass); }
  .stat-cell .sval.fail   { color: var(--fail); }

  .stat-cell .sunit {
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── SECTION HEADER ─────────────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-header h2 {
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section-header .line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── NODES GRID ─────────────────────────────────── */
  #nodes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .node-card {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.35s, transform 0.35s, border-color 0.2s;
  }

  .node-card.visible { opacity: 1; transform: none; }
  .node-card:hover { border-color: #2e4060; }

  .node-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: #0a0f16;
  }

  .node-id {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 260px;
  }

  .node-status {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 3px 10px;
    border: 1px solid;
  }

  .node-status.PASS { color: var(--pass); border-color: var(--pass); }
  .node-status.FAIL { color: var(--fail); border-color: var(--fail); }

  .node-timestamp {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    padding: 6px 18px;
    border-bottom: 1px solid var(--border);
  }

  /* ── TESTS TABLE ────────────────────────────────── */
  .tests-list { padding: 12px 18px 16px; }

  .test-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid #111820;
  }

  .test-row:last-child { border-bottom: none; }

  .test-name {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
  }

  .test-metrics {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  .test-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .test-dot.PASS { background: var(--pass); box-shadow: 0 0 6px var(--pass); }
  .test-dot.FAIL { background: var(--fail); box-shadow: 0 0 6px var(--fail); }

  /* GPU mini-bar */
  .gpu-bars { padding: 0 18px 14px; }

  .gpu-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 5px;
  }

  .gpu-bar-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    width: 42px;
    flex-shrink: 0;
  }

  .gpu-bar-track {
    flex: 1;
    height: 4px;
    background: #1a2535;
    position: relative;
    overflow: hidden;
  }

  .gpu-bar-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--pass));
    transition: width 1s ease;
  }

  .gpu-bar-val {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text);
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── EMPTY / ERROR STATE ───────────────────────── */
  #empty-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 1px;
    text-align: center;
  }

  #empty-state .big { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }

  /* ── PULSE DOT ─────────────────────────────────── */
  .live-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--pass);
    margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,229,160,0.5); }
    50%       { opacity: 0.7; box-shadow: 0 0 0 5px rgba(0,229,160,0); }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>⬡ ClusterEye</h1>
    <span class="sub">GPU Health Monitor</span>
  </div>
  <div class="header-right">
    <span id="last-updated">—</span>
    <button id="refresh-btn" onclick="fetchData()">
      <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Refresh
    </button>
  </div>
</header>

<main>
  <!-- Cluster Summary -->
  <div id="cluster-banner">
    <div class="status-slab">
      <div class="label">Cluster Status</div>
      <div id="cluster-status-badge" class="badge NO_DATA">—</div>
    </div>
    <div class="stats-grid" id="stats-grid">
      <div class="stat-cell">
        <div class="slabel">Total Nodes</div>
        <div class="sval accent" id="stat-nodes">—</div>
      </div>
      <div class="stat-cell">
        <div class="slabel">Healthy</div>
        <div class="sval pass" id="stat-healthy">—</div>
      </div>
      <div class="stat-cell">
        <div class="slabel">Failed</div>
        <div class="sval fail" id="stat-failed">—</div>
      </div>
      <div class="stat-cell">
        <div class="slabel">Total GPUs</div>
        <div class="sval accent" id="stat-gpus">—</div>
      </div>
      <div class="stat-cell" style="grid-column: span 2;">
        <div class="slabel">GPU Model</div>
        <div class="sval" id="stat-model" style="font-size:18px; color:#fff;">—</div>
      </div>
    </div>
  </div>

  <!-- Nodes -->
  <div class="section-header">
    <span class="live-dot"></span>
    <h2>Nodes</h2>
    <div class="line"></div>
  </div>

  <div id="nodes-grid"></div>

  <div id="empty-state">
    <div class="big">⬡</div>
    No result files found in /results
  </div>
</main>

<script>
const API = '';  // same origin; change to 'http://localhost:8000' for local dev

function fmt(ts) {
  try { return new Date(ts).toLocaleString(); } catch { return ts; }
}

function getTestMetric(test) {
  const m = test.metrics || {};
  switch (test.test) {
    case 'gpu_health':
      return `${m.gpu_count || 0} GPUs · CUDA ${(m.cuda_version||'').replace('V','')}`;
    case 'nccl_intra_node': {
      const s = m.summary || {};
      return `avg ${(s.avg_bandwidth||0).toFixed(1)} GB/s`;
    }
    case 'storage_preflight': {
      const r = m.seq_read || {};
      return `seq ${(r.mbps||0).toFixed(0)} MB/s`;
    }
    case 'gpu_compute_matmul': {
      const avg = (m.per_gpu||[]).reduce((a,g)=>a+g.tflops,0)/(m.per_gpu||[1]).length;
      return `${avg.toFixed(0)} TFLOPS/gpu`;
    }
    default: return '';
  }
}

function buildGpuBars(tests) {
  const gpuTest = tests.find(t => t.test === 'gpu_health');
  if (!gpuTest) return '';
  const gpus = gpuTest.metrics.gpus || [];
  if (!gpus.length) return '';

  // Use tflops from matmul if available
  const matmulTest = tests.find(t => t.test === 'gpu_compute_matmul');
  const tflopsMap = {};
  if (matmulTest) {
    for (const g of (matmulTest.metrics.per_gpu || [])) tflopsMap[g.gpu] = g.tflops;
  }
  const maxTflops = Math.max(...Object.values(tflopsMap), 1);

  const rows = gpus.map(g => {
    const tflops = tflopsMap[g.index];
    const pct = tflops ? (tflops / maxTflops * 100).toFixed(1) : 0;
    const label = tflops ? `${tflops.toFixed(0)} TF` : `${g.temperature}°C`;
    return `
      <div class="gpu-bar-row">
        <span class="gpu-bar-label">GPU ${g.index}</span>
        <div class="gpu-bar-track">
          <div class="gpu-bar-fill" style="width:${pct}%"></div>
        </div>
        <span class="gpu-bar-val">${label}</span>
      </div>`;
  }).join('');

  return `<div class="gpu-bars">${rows}</div>`;
}

function buildNodeCard(node, index) {
  const tests = node.tests || [];
  const testRows = tests.map(t => `
    <div class="test-row">
      <span class="test-name">${t.test}</span>
      <span class="test-metrics">${getTestMetric(t)}</span>
      <div class="test-dot ${t.status}"></div>
    </div>`).join('');

  return `
    <div class="node-card" id="node-${index}" style="transition-delay:${index * 60}ms">
      <div class="node-card-header">
        <span class="node-id" title="${node.node}">${node.node}</span>
        <span class="node-status ${node.status}">${node.status}</span>
      </div>
      <div class="node-timestamp">⏱ ${fmt(node.timestamp)}</div>
      <div class="tests-list">${testRows}</div>
      ${buildGpuBars(tests)}
    </div>`;
}

async function fetchData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');

  try {
    const res = await fetch(`${API}/api/cluster`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const s = data.summary;

    // Banner
    const badge = document.getElementById('cluster-status-badge');
    badge.textContent = s.cluster_status;
    badge.className = `badge ${s.cluster_status}`;

    document.getElementById('stat-nodes').textContent   = s.total_nodes;
    document.getElementById('stat-healthy').textContent = s.healthy_nodes;
    document.getElementById('stat-failed').textContent  = s.failed_nodes;
    document.getElementById('stat-gpus').textContent    = s.total_gpus;
    document.getElementById('stat-model').textContent   = s.gpu_model || '—';

    const banner = document.getElementById('cluster-banner');
    banner.classList.add('visible');

    // Nodes
    const grid = document.getElementById('nodes-grid');
    const empty = document.getElementById('empty-state');

    if (!data.nodes.length) {
      grid.innerHTML = '';
      empty.style.display = 'flex';
    } else {
      empty.style.display = 'none';
      grid.innerHTML = data.nodes.map((n, i) => buildNodeCard(n, i)).join('');
      // Trigger animations
      requestAnimationFrame(() => {
        document.querySelectorAll('.node-card').forEach(c => c.classList.add('visible'));
      });
    }

    document.getElementById('last-updated').textContent =
      `UPDATED ${new Date().toLocaleTimeString()}`;

  } catch (err) {
    document.getElementById('last-updated').textContent = `ERROR: ${err.message}`;
  } finally {
    btn.classList.remove('loading');
  }
}

// Initial load
fetchData();
</script>
</body>
</html>
