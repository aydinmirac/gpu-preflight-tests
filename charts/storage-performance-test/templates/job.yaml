apiVersion: batch/v1
kind: Job
metadata:
  name: storage-preflight
  namespace: {{ .Release.Namespace }}
spec:
  parallelism: {{ .Values.parallelism }}
  completions: {{ .Values.parallelism }}
  template:
    spec:
      serviceAccountName: storage-preflight-sa
      restartPolicy: Never
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values: ["storage-preflight"]
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: storage-tester
        image: "ubuntu:24.04"
        command: ["/bin/bash", "/scripts/run_storage_test.sh"]
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: results
          mountPath: /results
      volumes:
      - name: scripts
        configMap:
          name: storage-preflight-script
      - name: results
        persistentVolumeClaim:
          claimName: preflight-results