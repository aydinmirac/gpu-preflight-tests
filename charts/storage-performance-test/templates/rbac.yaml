apiVersion: v1
kind: ServiceAccount
metadata:
  name: storage-preflight-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: storage-preflight-role
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "patch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: storage-preflight-binding
subjects:
- kind: ServiceAccount
  name: storage-preflight-sa
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: storage-preflight-role
  apiGroup: rbac.authorization.k8s.io