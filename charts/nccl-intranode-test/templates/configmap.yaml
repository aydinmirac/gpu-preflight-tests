apiVersion: v1
kind: ConfigMap
metadata:
  name: nccl-preflight-script
  namespace: {{ .Release.Namespace }}
data:
  run_nccl.sh: |
    # Environment Setup 
    export DEBIAN_FRONTEND=noninteractive
    export PATH=$PATH:/usr/local/bin
    NODE_NAME=${NODE_NAME:-"unknown-node"}
    NCCL_BIN="/opt/nccl-tests/build/all_reduce_perf"

    echo "=== Preflight NCCL: Starting on $NODE_NAME ==="

    # Install Runtime Dependencies
    echo "Updating system and installing jq/bc/curl..."
    apt-get update -qq && apt-get install -y -qq jq bc curl > /dev/null

    if [ ! -f /usr/local/bin/kubectl ]; then
      echo "Installing kubectl v1.32.0..."
      curl -L -s -o /usr/local/bin/kubectl "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl"
      chmod +x /usr/local/bin/kubectl
    fi

    # GPU Detection
    GPU_COUNT=$(nvidia-smi -L | wc -l)
    echo "Detected $GPU_COUNT GPUs."

    if [ "$GPU_COUNT" -lt 2 ]; then
      echo "Insufficient GPUs for NCCL test. Skipping."
      exit 0
    fi

    # Execute NCCL Test 
    echo "Running NCCL all_reduce_perf (Message Size: {{ .Values.expected.maxMessageSize }})..."

    OUTPUT=$($NCCL_BIN \
      -b {{ .Values.expected.minMessageSize }} \
      -e {{ .Values.expected.maxMessageSize }} \
      -f 2 -g $GPU_COUNT)

    # Extract Bus Bandwidth (busbw)
    BW=$(echo "$OUTPUT" | grep -E "^[0-9]" | tail -1 | awk '{print $8}')
    echo "Measured Bandwidth: $BW GB/s"

    # Performance Validation
    THRESHOLD={{ .Values.expected.minBandwidthGBps }}
    IS_HEALTHY=$(echo "$BW >= $THRESHOLD" | bc -l)

    if [ "$IS_HEALTHY" -eq 1 ]; then
        STATUS="PASS"
        echo "Result: SUCCESS (Threshold: $THRESHOLD GB/s)"
    else
        STATUS="FAIL"
        echo "Result: DEGRADED (Below $THRESHOLD GB/s)"
    fi

    # Store the results in PVC
    mkdir -p /results
    RESULT_FILE="/results/${NODE_NAME}-nccl.json"

    jq -n \
      --arg node "$NODE_NAME" \
      --arg status "$STATUS" \
      --arg bw "$BW" \
      --arg time "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
      '{node: $node, test: "nccl", status: $status, timestamp: $time, metrics: {bus_bw_gbps: $bw}}' \
      > "$RESULT_FILE"

    # Taints & Labels for Kubernetes nodes
    if [ "$STATUS" == "FAIL" ]; then
      echo "Tainting node $NODE_NAME as degraded..."
      kubectl taint node "$NODE_NAME" hardware=nccl-degraded:NoSchedule --overwrite
    else
      echo "Labeling node $NODE_NAME as healthy..."
      kubectl label node "$NODE_NAME" preflight-nccl=passed --overwrite
    fi

    echo "=== Preflight NCCL: Complete ==="