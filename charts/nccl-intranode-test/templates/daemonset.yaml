apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nccl-intranode-test
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: nccl-intranode-test
  template:
    metadata:
      labels:
        app: nccl-intranode-test
    spec:
      serviceAccountName: nccl-preflight-sa
      restartPolicy: Always
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      containers:
      - name: nccl-test
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["/bin/bash", "/scripts/run_nccl.sh"]
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: results
          mountPath: /results
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: scripts
        configMap:
          name: nccl-preflight-script
          defaultMode: 0755
      - name: results
        persistentVolumeClaim:
          claimName: preflight-results
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: {{ .Values.shmSize }}