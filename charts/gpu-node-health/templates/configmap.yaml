apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-preflight-script
  namespace: {{ .Release.Namespace }}
data:
  preflight.py: |
    import subprocess
    import torch
    import time
    import json
    import os
    import sys

    NODE_NAME = os.environ.get("NODE_NAME")
    result = {
        "node": NODE_NAME,
        "test": "gpu",
        "status": "PASS",
        "metrics": {},
        "errors": []
    }

    def fail(msg):
        result["status"] = "FAIL"
        result["errors"].append(msg)


    # --- Installing kubectl command ---
    def install_kubectl():
        if not os.path.exists("/tmp/kubectl"):
            print("Installing kubectl...")
            try:
                # Download the binary
                subprocess.check_call([
                    "curl", "-L", "-o", "/tmp/kubectl",
                    "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
                ])
                os.chmod("/tmp/kubectl", 0o755)
                # Add /tmp to PATH to make kubectl works
                os.environ["PATH"] += os.pathsep + "/tmp"
            except Exception as e:
                print(f"Failed to install kubectl: {e}")
                sys.exit(1)

    install_kubectl()

    # -----------------------
    # Driver check
    # -----------------------
    try:
        driver = subprocess.check_output(
            ["nvidia-smi", "--query-gpu=driver_version", "--format=csv,noheader"]
        ).decode().strip().split("\n")[0]

        result["metrics"]["driver_version"] = driver

        expected_driver = "{{ .Values.expected.driverVersion }}"
        if not driver.startswith(expected_driver):
            fail(f"Driver version mismatch: {driver}")

    except Exception as e:
        fail(f"Driver check failed: {e}")

    # -----------------------
    # GPU count + health
    # -----------------------
    try:
        output = subprocess.check_output(
            ["nvidia-smi",
             "--query-gpu=temperature.gpu,ecc.errors.uncorrected",
             "--format=csv,noheader,nounits"]
        ).decode().strip().split("\n")

        gpu_count = len(output)
        result["metrics"]["gpu_count"] = gpu_count

        temps = []
        ecc_errors = []

        if gpu_count < {{ .Values.expected.minGpuCount }}:
            fail("Insufficient GPU count")

        for line in output:
            temp, ecc = line.split(", ")
            temp = int(temp)
            ecc = int(ecc)

            temps.append(temp)
            ecc_errors.append(ecc)

            if temp > {{ .Values.expected.maxTemperature }}:
                fail(f"High temperature: {temp}")
            if ecc > {{ .Values.expected.maxEccErrors }}:
                fail(f"ECC errors detected: {ecc}")

        result["metrics"]["temperatures"] = temps
        result["metrics"]["ecc_errors"] = ecc_errors

    except Exception as e:
        fail(f"GPU health check failed: {e}")

    # -----------------------
    # Matrix Multiply Test
    # -----------------------
    try:
        device = torch.device("cuda")
        a = torch.randn(4096, 4096, device=device)
        b = torch.randn(4096, 4096, device=device)

        torch.cuda.synchronize()
        start = time.time()
        c = torch.matmul(a, b)
        torch.cuda.synchronize()
        elapsed = time.time() - start

        result["metrics"]["matmul_time_sec"] = elapsed

        if elapsed > {{ .Values.expected.maxMatmulTimeSeconds }}:
            fail(f"Matmul too slow: {elapsed}s")

    except Exception as e:
        fail(f"Matmul failed: {e}")

    # -----------------------
    # Write JSON Result
    # -----------------------
    try:
        os.makedirs("/results", exist_ok=True)
        with open(f"/results/{NODE_NAME}-gpu.json", "w") as f:
            json.dump(result, f, indent=2)
    except Exception as e:
        print(f"Failed to write result JSON: {e}")

    # -----------------------
    # Taint or Label Node
    # -----------------------
    if result["status"] == "FAIL":
        subprocess.call([
            "kubectl", "taint", "node", NODE_NAME,
            "preflight=failed:NoSchedule", "--overwrite"
        ])
        print("Node marked as FAILED")
        print(json.dumps(result, indent=2))
        sys.exit(1)
    else:
        subprocess.call([
            "kubectl", "label", "node", NODE_NAME,
            "preflight-status=passed", "--overwrite"
        ])
        print("Node PASSED")
        print(json.dumps(result, indent=2))
        sys.exit(0)