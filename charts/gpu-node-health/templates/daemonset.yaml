apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-node-health
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: gpu-node-health
  template:
    metadata:
      labels:
        app: gpu-node-health
    spec:
      serviceAccountName: gpu-preflight-sa
      restartPolicy: Always
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      containers:
      - name: preflight
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["/bin/bash", "-c", "python /scripts/preflight.py"]
        resources:
          limits:
            nvidia.com/gpu: 8 
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: results
          mountPath: /results
      volumes:
      - name: scripts
        configMap:
          name: gpu-preflight-script
      - name: results
        persistentVolumeClaim:
          claimName: preflight-results