apiVersion: v1
kind: Pod
metadata:
  name: gpu-dashboard
  labels:
    app: gpu-dashboard
spec:
  restartPolicy: Never

  containers:
    - name: dashboard
      image: python:3.11-slim
      command:
        - sh
        - -c
        - |
          apt-get update && apt-get install -y git && \
          git clone --depth 1 https://github.com/aydinmirac/gpu-preflight-tests.git /repo && \
          pip install --no-cache-dir fastapi uvicorn[standard] && \
          cd /repo/dashboard && \
          uvicorn main:app --host 0.0.0.0 --port 8000
      ports:
        - containerPort: 8000
          name: http
      env:
        - name: RESULTS_DIR
          value: /results
      volumeMounts:
        - name: repo
          mountPath: /repo
        - name: results
          mountPath: /results

  volumes:
    - name: repo
      emptyDir: {}
    - name: results
      persistentVolumeClaim:
        claimName: preflight-tests-workspace