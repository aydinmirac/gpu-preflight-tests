apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: nccl-tests
spec:
  templates:
  - name: nccl-test
    inputs:
      parameters:
      - name: node
      - name: githubRepo
      - name: gpuHealthImage
      - name: minGpuCount
      - name: expectedBandwidth
      - name: expectedLatency
    container:
      image: "{{inputs.parameters.gpuHealthImage}}"
      command: ["sh", "-c"]
      args:
        - |
          # Clone repo if missing
          if [ ! -d "/workspace/repo/.git" ]; then
            git clone --depth 1 {{inputs.parameters.githubRepo}} /workspace/repo
          else
            cd /workspace/repo && git pull
          fi

          # Run NCCL tests
          python3 /workspace/repo/scripts/nccl_tests.py
      resources:
        requests:
          nvidia.com/gpu: "{{inputs.parameters.minGpuCount}}"
        limits:
          nvidia.com/gpu: "{{inputs.parameters.minGpuCount}}"
      env:
      - name: NODE_NAME
        value: "{{inputs.parameters.node}}"
      - name: MIN_GPU_COUNT
        value: "{{inputs.parameters.minGpuCount}}"
      - name: EXPECTED_BANDWIDTH
        value: "{{inputs.parameters.expectedBandwidth}}"
      - name: EXPECTED_LATENCY
        value: "{{inputs.parameters.expectedLatency}}"
      volumeMounts:
      - name: workspace
        mountPath: /workspace
      - name: workspace
        mountPath: /results
        subPath: results
    nodeSelector:
      kubernetes.io/hostname: "{{inputs.parameters.node}}"
    tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
    volumes:
    - name: workspace
      persistentVolumeClaim:
        claimName: preflight-tests-workspace