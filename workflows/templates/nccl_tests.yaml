apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: nccl-tests
spec:
  templates:
  - name: nccl-test
    inputs:
      parameters:
      - name: node
      - name: githubRepo
      - name: gpuHealthImage
      - name: minGpuCount
      - name: expectedBandwidth
      - name: expectedLatency
    container:
      image: "{{inputs.parameters.gpuHealthImage}}"
      command: ["sh", "-c"]
      args:
        - |
          # Set UCX environment variables
          export UCX_MEMTYPE_CACHE=n
          export UCX_TLS=tcp
          export UCX_RNDV_SCHEME=put_zcopy
          export UCX_IB_DISABLE=1
          export UCX_MAX_RNDV_RAILS=1

          # Additional NCCL settings
          export NCCL_DEBUG=INFO
          export NCCL_ALGO=Tree
          export NCCL_PROTO=Simple
          export NCCL_NET_GDR_LEVEL=0

          # Clean up any existing Git lock files
          if [ -d "/workspace/repo" ]; then
            cd /workspace/repo
            rm -f .git/index.lock
            git fetch --all
            git reset --hard origin/main
          else
            git clone --depth 1 {{inputs.parameters.githubRepo}} /workspace/repo
          fi

          # Run NCCL tests
          python3 /workspace/repo/scripts/nccl_test.py
      resources:
        requests:
          nvidia.com/gpu: 8
        limits:
          nvidia.com/gpu: 8
      env:
      - name: NODE_NAME
        value: "{{inputs.parameters.node}}"
      - name: MIN_GPU_COUNT
        value: "{{inputs.parameters.minGpuCount}}"
      - name: EXPECTED_BANDWIDTH
        value: "{{inputs.parameters.expectedBandwidth}}"
      - name: EXPECTED_LATENCY
        value: "{{inputs.parameters.expectedLatency}}"
      securityContext:
        runAsUser: 0 
        capabilities:
          add: ["IPC_LOCK"]
      volumeMounts:
      - name: workspace
        mountPath: /workspace
      - name: workspace
        mountPath: /results
    nodeSelector:
      kubernetes.io/hostname: "{{inputs.parameters.node}}"
    tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
    volumes:
    - name: workspace
      persistentVolumeClaim:
        claimName: preflight-tests-workspace