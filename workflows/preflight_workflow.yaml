apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: preflight-tests
spec:
  serviceAccountName: argo-workflow
  entrypoint: preflight-checks
  arguments:
    parameters:
    - name: githubRepo
      value: "https://github.com/username/gpu-preflight-tests.git"
    - name: gpuHealthImage
      value: "ghcr.io/coreweave/nccl-tests:12.8.1-devel-ubuntu22.04-nccl2.29.2-1-2276a5e"
    - name: minGpuCount
      value: "8"
    - name: driverVersion
      value: "570"
    - name: cudaVersion
      value: "12.8"
    - name: maxTemperature
      value: "85"
    - name: maxEccErrors
      value: "0"
    - name: expectedBandwidth
      value: "100"  # Adjust based on your GPU model
    - name: expectedLatency
      value: "10"   # Adjust based on your GPU model
    - name: nodes
      value: '["computeinstance","computeinstance"]'
    - name: minSeqReadMBps
      value: "500"
    - name: minRandReadIOPS
      value: "2000"
    - name: maxRandP95LatMs
      value: "5.0"
    - name: computeImage
      value: "pytorch/pytorch:2.2.2-cuda12.1-cudnn8-runtime"
    - name: minTflops
      value: "50"
    - name: preflightLabelKey
      value: "preflight-status"
    - name: preflightTaintKey
      value: "preflight-not-ready"
    - name: preflightTaintEffect
      value: "NoSchedule"
    - name: preflightLastRunAnnotationKey
      value: "preflight-last-run"
    - name: preflightFailuresAnnotationKey
      value: "preflight-failing-tests"

  templates:
  - name: preflight-checks
    steps:
    - - name: run-gpu-health
        templateRef:
          name: gpu-health
          template: gpu-health
        arguments:
          parameters:
          - name: node
            value: "{{item}}"
          - name: githubRepo
            value: "{{workflow.parameters.githubRepo}}"
          - name: gpuHealthImage
            value: "{{workflow.parameters.gpuHealthImage}}"
          - name: minGpuCount
            value: "{{workflow.parameters.minGpuCount}}"
          - name: driverVersion
            value: "{{workflow.parameters.driverVersion}}"
          - name: cudaVersion
            value: "{{workflow.parameters.cudaVersion}}"
          - name: maxTemperature
            value: "{{workflow.parameters.maxTemperature}}"
          - name: maxEccErrors
            value: "{{workflow.parameters.maxEccErrors}}"
        withParam: "{{workflow.parameters.nodes}}"
    - - name: run-nccl-tests
        templateRef:
          name: nccl-tests
          template: nccl-test
        arguments:
          parameters:
          - name: node
            value: "{{item}}"
          - name: githubRepo
            value: "{{workflow.parameters.githubRepo}}"
          - name: gpuHealthImage
            value: "{{workflow.parameters.gpuHealthImage}}"
          - name: minGpuCount
            value: "{{workflow.parameters.minGpuCount}}"
          - name: expectedBandwidth
            value: "{{workflow.parameters.expectedBandwidth}}"
          - name: expectedLatency
            value: "{{workflow.parameters.expectedLatency}}"
        withParam: "{{workflow.parameters.nodes}}"
    - - name: run-storage-tests
        templateRef:
          name: storage-tests
          template: storage-test
        arguments:
          parameters:
          - name: node
            value: "{{item}}"
          - name: githubRepo
            value: "{{workflow.parameters.githubRepo}}"
          - name: gpuHealthImage
            value: "{{workflow.parameters.gpuHealthImage}}"
          - name: minSeqReadMBps
            value: "{{workflow.parameters.minSeqReadMBps}}"
          - name: minRandReadIOPS
            value: "{{workflow.parameters.minRandReadIOPS}}"
          - name: maxRandP95LatMs
            value: "{{workflow.parameters.maxRandP95LatMs}}"
        withParam: "{{workflow.parameters.nodes}}"
    - - name: run-compute-tests
        templateRef:
          name: compute-tests
          template: compute-test
        arguments:
          parameters:
          - name: node
            value: "{{item}}"
          - name: githubRepo
            value: "{{workflow.parameters.githubRepo}}"
          - name: computeImage
            value: "{{workflow.parameters.computeImage}}"
          - name: minTflops
            value: "{{workflow.parameters.minTflops}}"
        withParam: "{{workflow.parameters.nodes}}"
    - - name: apply-node-policy
        templateRef:
          name: node-policy
          template: apply-node-policy
        arguments:
          parameters:
          - name: githubRepo
            value: "{{workflow.parameters.githubRepo}}"
          - name: nodes
            value: "{{workflow.parameters.nodes}}"
          - name: preflightLabelKey
            value: "preflight-status"
          - name: preflightTaintKey
            value: "preflight-not-ready"
          - name: preflightTaintEffect
            value: "NoSchedule"
          - name: preflightLastRunAnnotationKey
            value: "preflight-last-run"
          - name: preflightFailuresAnnotationKey
            value: "preflight-failing-tests"