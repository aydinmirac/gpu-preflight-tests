apiVersion: v1
kind: ServiceAccount
metadata:
  name: preflight-node-labeler
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: preflight-node-labeler
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: preflight-node-labeler-binding
subjects:
- kind: ServiceAccount
  name: preflight-node-labeler
  namespace: default
roleRef:
  kind: ClusterRole
  name: preflight-node-labeler
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: preflight-node-labeler-argo-binding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflow-role 
subjects:
- kind: ServiceAccount
  name: preflight-node-labeler
  namespace: default