apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: preflight-node-labeler
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: preflight-node-labeler-binding
subjects:
- kind: ServiceAccount
  name: argo-workflow
  namespace: <your-namespace>
roleRef:
  kind: ClusterRole
  name: preflight-node-labeler
  apiGroup: rbac.authorization.k8s.io